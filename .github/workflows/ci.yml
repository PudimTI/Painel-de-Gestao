name: CI - Painel de Gestão de Usuários

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm install

      - name: Validar ESLint
        [cite_start]run: npm run lint # [cite: 48]

      - name: Executar Testes Automatizados
        [cite_start]run: npm test # [cite: 47]

      - name: Gerar Build de Produção
        [cite_start]run: npm run build # [cite: 49]